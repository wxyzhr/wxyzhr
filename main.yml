# 工作流名称（自定义）
name: 第一个GitHub Actions测试

# 触发条件：main 分支发生 push/拉取请求时触发
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

# 任务集合：一个 workflow 可包含多个 job
jobs:
  # 任务名称（自定义）
  build-and-test:
    # 运行环境：GitHub 提供的虚拟环境（支持 Ubuntu/Linux、Windows、macOS）
    # 若需适配信创本地环境，可使用「自托管运行器（Self-hosted Runner）」，后续补充
    runs-on: ubuntu-latest

    # 任务步骤
    steps:
      # 步骤1：拉取仓库代码到虚拟环境
      - name: 拉取代码
        uses: actions/checkout@v4

      # 步骤2：执行自定义 Shell 命令（模拟项目构建/测试）
      - name: 运行测试脚本
        run: |
          echo "Hello GitHub Actions!"
          echo "当前系统信息："
          uname -a
          # 可添加你需要的命令：如安装依赖、启动服务等
